name: Test

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "**.py"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/test.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements*.txt
      - run: pip install -r requirements-dev.txt
      - run: python3 -m pytest --cov=miele_outlet_scrape --cov-report=term-missing --cov-report=xml
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
